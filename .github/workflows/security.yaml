name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Run every day at 10:00 UTC (6:00 AM ET / 3:00 AM PT)
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for pull requests when developers push
# additional changes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          languages: go

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          category: "/language:go"

  trivy:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Build binary for linux/amd64
        run: make bin/code-marketplace-linux-amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        id: build
        run: |
          docker buildx bake \
            -f ./docker-bake.hcl \
            --set "*.platform=linux/amd64" \
            --set "*.tags=code-marketplace:scan" \
            --load
          echo "image=code-marketplace:scan" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner (table output for logs)
        uses: aquasecurity/trivy-action@f685ba721536b1ff19093eb4e1b1bf994c2bdbe2 # v0.34.2
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: "table"
          severity: "LOW,MEDIUM,HIGH,CRITICAL"

      - name: Run Trivy vulnerability scanner (SARIF output for GitHub)
        uses: aquasecurity/trivy-action@f685ba721536b1ff19093eb4e1b1bf994c2bdbe2 # v0.34.2
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "LOW,MEDIUM,HIGH,CRITICAL"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          sarif_file: "trivy-results.sarif"
          category: "Trivy"

      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7
